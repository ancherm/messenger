version: '3.8'

services:
  postgres-db:
    image: postgres:18
    container_name: messenger-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"${DATABASE_USERNAME}\" -d \"${DATABASE_DB}\" || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: java-app
    depends_on:
      postgres-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8888:8888"
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata: