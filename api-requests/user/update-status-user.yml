      value: Bearer {{tokenLogin}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "status": "ONLINE"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
