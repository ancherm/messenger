info:
  name: create-channel
  type: http
  seq: 4

http:
  method: post
  url: http://localhost:8888/api/chats
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "type": "CHANNEL",
        "title": "Мой канал",
        "description": "Описание канала"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
