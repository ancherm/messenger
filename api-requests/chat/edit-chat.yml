info:
  name: edit-chat
  type: http
  seq: 7

http:
  method: patch
  url: http://localhost:8888/api/chats/{{chatId}}
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Новое название",
        "description": "Новое описание"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
