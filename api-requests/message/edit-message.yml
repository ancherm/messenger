info:
  name: edit-message
  type: http
  seq: 6

http:
  method: patch
  url: http://localhost:8888/api/messages/{{msgId}}
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "content": "Привет, исправлено!"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
