info:
  name: cursor-message
  type: http
  seq: 3

http:
  method: get
  url: http://localhost:8888/api/chats/{{chatId}}/messages?before=5&limit=10
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
  params:
    - name: before
      value: "5"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
