info:
  name: history-message
  type: http
  seq: 2

http:
  method: get
  url: http://localhost:8888/api/chats/{{chatId}}/messages?limit=10
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
  params:
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
