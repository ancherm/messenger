info:
  name: send-message-attachment
  type: http
  seq: 8

http:
  method: post
  url: http://localhost:8888/api/chats/{{chatId}}/messages
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "contentType": "IMAGE",
        "attachmentUrl": "https://example.com/img.png",
        "attachmentName": "img.png"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
