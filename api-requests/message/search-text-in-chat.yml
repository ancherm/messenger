info:
  name: search-text-in-chat
  type: http
  seq: 4

http:
  method: get
  url: http://localhost:8888/api/chats/{{chatId}}/messages?search=Привет
  headers:
    - name: Authorization
      value: Bearer {{tokenLogin}}
  params:
    - name: search
      value: Привет
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
